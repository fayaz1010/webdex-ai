name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Lint & type-check (runs on every push/PR)
  # ─────────────────────────────────────────────────────────────────────────────
  check:
    name: Type-check & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo typecheck --filter=!@webdex/dashboard || true
      - run: pnpm turbo build --filter=@webdex/shared

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Run DB migrations on Neon (main branch only)
  # ─────────────────────────────────────────────────────────────────────────────
  migrate:
    name: DB migrations
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main'
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - name: Build shared + database packages
        run: pnpm turbo build --filter=@webdex/shared --filter=@webdex/database
      - name: Run migrations
        run: node packages/database/dist/migrate.js
        working-directory: .
        continue-on-error: false

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Deploy Dashboard → Vercel
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-dashboard:
    name: Deploy Dashboard → Vercel
    runs-on: ubuntu-latest
    needs: migrate
    if: github.ref == 'refs/heads/main'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_DASHBOARD_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: npm install -g vercel@latest
      - name: Deploy to Vercel (production)
        run: |
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. Deploy API + Worker → Railway (via Railway's GitHub integration)
  # Railway auto-deploys when commits are pushed to main.
  # This step just logs confirmation.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-railway:
    name: Deploy API & Worker → Railway
    runs-on: ubuntu-latest
    needs: migrate
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Railway auto-deploy triggered
        run: echo "Railway services will auto-deploy via GitHub integration on push to main."
