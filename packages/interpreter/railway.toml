[build]
builder = "NIXPACKS"
buildCommand = "cd ../.. && pnpm install --frozen-lockfile && pnpm turbo build --filter=@webdex/interpreter..."

[deploy]
# Worker process — no HTTP, no healthcheck
startCommand = "node packages/interpreter/dist/worker.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
